<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url(./res/wp/wp3.jpg);">
    <!--MENUBAR-->
    <div class="menu-bar">
        <div id="blur-overlay"></div>
        <p style="margin-left: 16px;"> Frutiger OS </p> 
        <p id="timeElement" style="margin-right: 16px;"> TIME </p>
    </div>

    <!------------DESKTOP------------>
    <!--DESKTOP APPS-->
    <div id="desktopApps" style="padding-top: 64px; padding-left: 16px;">
        <button class="desktopApp" onClick="handleWindow('.welcome', 'open')">
            <img src="./res/icons/app/welcome.ico" style="width: 64px; height: 64px; border-radius: 16px;">
            <p style="margin: 0px; color: #fff; text-shadow: 1px 0px 2px black;">Welcome</p>
        </button>

        <button class="desktopApp" onClick="handleWindow('.notepad', 'open')">
            <img src="./res/icons/app/notepad.webp" style="width: 64px; height: 64px; border-radius: 16px;">
            <p style="margin: 0px; color: #fff; text-shadow: 1px 0px 2px black;">Notepad</p>
        </button>
    </div>


    <!------------WINDOWS------------>
    <!--WINDOW WELCOME-->
    <div class="window welcome" style="display:none;">
        <div class="dragable-holder">
            <div class="aero-title">Welcome</div>
            <div class="aero-controls">
                <button class="control-btn min" aria-label="Minimize"></button>
                <button class="control-btn max" aria-label="Maximize"></button>
                <button class="control-btn close" aria-label="Close"></button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="aero-banner">
                <h1>Frutier OS</h1>
            </div>
            <div class="window-content">
                <p style="margin: 0px 0px 80px 0px;">Experience the ultimate web desktop environment built on clear glass and high optimism.</p>
                <div class="button-group">
                    <button class="aero-btn btn-green" onClick="handleWindow('.welcome', 'close')">Get Started</button>
                </div>
            </div>
        </div>
    </div>
    
    <!--NOTEPAD WINDOW-->
    <div class="window notepad" style="display:flex">
        <div class="dragable-holder">
            <div class="aero-title">Notepad</div>
            <div class="aero-controls">
                <button class="control-btn min" aria-label="Minimize"></button>
                <button class="control-btn max" aria-label="Maximize"></button>
                <button class="control-btn close" aria-label="Close"></button>
            </div>
        </div>
        
        <div class="window-topbar blur-overlay" style="border-radius:5px 5px 0px 0px;">
            <button class="menu-item">Save</button>
            <button class="menu-item">Format</button>
            <button class="menu-item">Revert</button>
            <button class="menu-item">Delete</button>
        </div>

        <div class="window-body" style="border-radius:0px 0px 5px 5px;">
                <div class="window-main">
                    <div class="window-bar-left" style="width: 180px;">
                        <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #1e293b;     border-bottom: 1px solid rgba(0, 0, 0, 0.15);">Recent</h4>
                        <p style="font-size: 11px; color: #64748b;">list of saved notes</p>
                    </div>

                    <div class="window-content">
                        <p>note content</p>
                    </div>
                </div>

            </div>
    </div>

    <script src="script.js"></script>
    <script src="js/note-app.js"></script>
</body>

</html>
