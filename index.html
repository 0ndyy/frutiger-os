<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url(./res/wp/wp1.jpg);">
    <!--MENUBAR-->
    <div class="menu-bar">
        <div id="blur-overlay"></div>
        <p style="margin-left: 16px;"> Frutiger OS </p> 
        <p id="timeElement" style="margin-right: 16px;"> TIME </p>
    </div>

    <!------------DESKTOP------------>
    <!--DESKTOP APPS-->
    <div id="desktopApps" style="padding-top: 64px; padding-left: 16px;">
        <button class="desktopApp" onClick="openWindow()";>
            <img src="./res/icons/app/welcome.ico" style="width: 64px; height: 64px; border-radius: 16px;">
            <p style="margin: 0px; color: #fff; text-shadow: 1px 0px 2px black;">Welcome</p>
        </button>

        <button class="desktopApp">
            <img src="./res/icons/app/notepad.webp" style="width: 64px; height: 64px; border-radius: 16px;">
            <p style="margin: 0px; color: #fff; text-shadow: 1px 0px 2px black;">Notes</p>
        </button>
    </div>


    <!------------WINDOWS------------>
    <!--WINDOW WELCOME-->
    <div class="window welcome">
        <div class="dragable-holder">
            <div class="aero-title">Welcome</div>
            <div class="aero-controls">
                <button class="control-btn min" aria-label="Minimize"></button>
                <button class="control-btn max" aria-label="Maximize"></button>
                <button class="control-btn close" aria-label="Close"></button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="aero-banner">
                <h1>Frutier OS</h1>
            </div>
            <div class="window-content">
                <p>Experience the ultimate web desktop environment built on clear glass and high optimism.</p>
                <div class="button-group">
                    <button class="aero-btn btn-green">Get Started</button>
                </div>
            </div>
        </div>
    </div>
    
    <!--NOTEPAD WINDOW-->
    <div class="window welcome">
        <div class="dragable-holder">
            <div class="aero-title">Notepad</div>
            <div class="aero-controls">
                <button class="control-btn min" aria-label="Minimize"></button>
                <button class="control-btn max" aria-label="Maximize"></button>
                <button class="control-btn close" aria-label="Close"></button>
            </div>
        </div>
        
        <div class="window-body">
            <div class="window-content">
                <p>....</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
